<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Blue Box</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <div class="container">
    <h1>Blue Box</h1>
    <p class="subtitle">Mic &rarr; Speaker</p>

    <button id="toggle" class="btn">Start</button>

    <div class="controls">
      <label for="gain">Volume</label>
      <input type="range" id="gain" min="0" max="3" step="0.05" value="1">
      <span id="gain-value">1.0x</span>
    </div>

    <p id="status" class="status">Tap Start to begin</p>
  </div>

  <script type="module" src="/main.js"></script>
</body>
</html>
